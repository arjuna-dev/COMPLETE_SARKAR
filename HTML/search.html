<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search — EE 7+</title>
    <script src="search_index.js"></script>
    <script src="filter_sets.js"></script>
    <style>
      :root[data-theme="dark"] {
        --bg: #2e2a24;
        --text: #ddd5c8;
        --text-dim: #8c8078;
        --text-mid: #a09088;
        --accent: #e07820;
        --accent-dim: rgba(224, 120, 32, 0.18);
        --border: #3e3228;
        --mark-bg: rgba(224, 120, 32, 0.28);
        --input-bg: #352f28;
        --input-border: #4a3c30;
        --input-focus: #e07820;
      }
      :root[data-theme="light"] {
        --bg: #f7f4f0;
        --text: #1a160e;
        --text-dim: #9a8e80;
        --text-mid: #6a6050;
        --accent: #c06010;
        --accent-dim: rgba(192, 96, 16, 0.1);
        --border: #d5cfc6;
        --mark-bg: rgba(192, 96, 16, 0.22);
        --input-bg: #ffffff;
        --input-border: #c8c0b4;
        --input-focus: #c06010;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Tahoma, "Arial Unicode MS", Geneva, sans-serif;
        font-size: 10pt;
        line-height: 1.5;
        transition:
          background-color 0.2s,
          color 0.2s;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      #page {
        min-height: 100%;
        max-width: 720px;
        margin: 0 auto;
        padding: 0 24px 60px;
      }

      /* Hero — collapses once results appear */
      #hero {
        padding: 60px 0 28px;
        text-align: center;
        transition: padding 0.25s;
      }
      #hero.has-results {
        padding: 22px 0 16px;
      }

      #hero-header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        margin-bottom: 26px;
      }
      #hero.has-results #hero-header {
        display: none;
      }

      #hero-photo {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        object-fit: cover;
        object-position: top center;
        border: 2px solid var(--border);
        flex-shrink: 0;
        opacity: 0.88;
      }

      #hero-title {
        font-size: 15pt;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--text);
        margin-bottom: 4px;
      }
      #hero-sub {
        font-size: 8.5pt;
        color: var(--text-dim);
        margin-bottom: 0;
      }
      /* hero-header (title + photo) hides when results appear */

      /* Search input */
      #search-wrap {
        position: relative;
        max-width: 560px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #search-input-wrap {
        position: relative;
        flex: 1;
        min-width: 0;
      }
      #search-input {
        width: 100%;
        background: var(--input-bg);
        border: 1.5px solid var(--input-border);
        border-radius: 28px;
        padding: 13px 46px 13px 20px;
        font-family: inherit;
        font-size: 11.5pt;
        color: var(--text);
        outline: none;
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
        -webkit-appearance: none;
      }
      #search-input::placeholder {
        color: var(--text-dim);
      }
      #search-input:focus {
        border-color: var(--input-focus);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }
      #search-input::-webkit-search-cancel-button {
        -webkit-appearance: none;
      }
      #search-icon {
        position: absolute;
        right: 17px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-dim);
        pointer-events: none;
      }

      /* ── Random discourse button ───────────────────────── */
      #random-btn {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: none;
        color: var(--text-dim);
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
        padding: 0;
      }
      #random-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }
      #search-hint {
        margin-top: 9px;
        font-size: 7.5pt;
        color: var(--text-dim);
        text-align: center;
      }

      /* Status */
      #status {
        font-size: 8pt;
        color: var(--text-dim);
        padding: 8px 0 2px;
        min-height: 20px;
      }

      /* Results */
      .result-group {
        margin-top: 22px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--border);
      }
      .result-group:last-child {
        border-bottom: none;
      }
      .result-title {
        font-size: 10.5pt;
        font-weight: 700;
        margin-bottom: 5px;
        line-height: 1.3;
      }
      .result-title a {
        color: var(--accent);
      }
      .result-title a:hover {
        color: var(--text);
        text-decoration: none;
      }
      .result-count {
        font-size: 8pt;
        color: var(--text-dim);
        font-weight: 400;
        margin-left: 4px;
      }
      .result-snippet {
        font-size: 8.5pt;
        color: var(--text-mid);
        line-height: 1.6;
        margin: 4px 0 2px;
      }
      .result-anchor {
        display: inline-block;
        font-size: 7.5pt;
        color: var(--text-dim);
        background: var(--accent-dim);
        border-radius: 3px;
        padding: 1px 5px;
        margin-right: 6px;
        text-decoration: none;
        transition:
          background 0.14s,
          color 0.14s;
      }
      .result-anchor:hover {
        background: var(--accent);
        color: #fff;
      }
      .result-snippet mark {
        background: var(--mark-bg);
        color: var(--text);
        border-radius: 2px;
        padding: 0 2px;
        font-weight: 600;
      }
      #show-more-btn {
        display: block;
        margin: 24px auto 0;
        padding: 9px 28px;
        background: none;
        border: 1.5px solid var(--border);
        border-radius: 20px;
        color: var(--text-mid);
        font-family: inherit;
        font-size: 8.5pt;
        cursor: pointer;
        transition:
          border-color 0.16s,
          color 0.16s,
          background 0.16s;
      }
      #show-more-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ── Filter chips ──────────────────────────────────────── */
      #filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        margin-top: 12px;
      }
      #filter-bar.hidden {
        display: none;
      }
      .filter-chip {
        padding: 4px 14px;
        border-radius: 14px;
        border: 1.5px solid var(--border);
        background: none;
        color: var(--text-dim);
        font-family: inherit;
        font-size: 8pt;
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
        white-space: nowrap;
      }
      .filter-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .filter-chip.active {
        border-color: var(--accent);
        background: var(--accent-dim);
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="page">
      <div id="hero">
        <div id="hero-header">
          <div>
            <p id="hero-title">Works of P.R. Sarkar</p>
            <p id="hero-sub">Full-text search across 1,600+ discourses</p>
          </div>
          <img id="hero-photo" src="Images/Sarkar.jpg" alt="P.R. Sarkar" />
        </div>
        <div id="search-wrap">
          <div id="search-input-wrap">
            <input
              id="search-input"
              type="search"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="Search discourses…"
              aria-label="Search discourses"
            />
            <svg
              id="search-icon"
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            >
              <circle cx="6.5" cy="6.5" r="4.5" />
              <line x1="10" y1="10" x2="14" y2="14" />
            </svg>
          </div>
          <button
            id="random-btn"
            type="button"
            aria-label="Open a random discourse"
            title="Random discourse"
          >
            <svg
              width="15"
              height="15"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="1" y="1" width="14" height="14" rx="3" />
              <circle cx="5" cy="5" r="1" fill="currentColor" stroke="none" />
              <circle cx="11" cy="5" r="1" fill="currentColor" stroke="none" />
              <circle cx="5" cy="11" r="1" fill="currentColor" stroke="none" />
              <circle cx="11" cy="11" r="1" fill="currentColor" stroke="none" />
              <circle cx="8" cy="8" r="1" fill="currentColor" stroke="none" />
            </svg>
          </button>
        </div>
        <p id="search-hint">
          Type at least 3 characters &nbsp;·&nbsp; diacritics ignored:
          <em>siva</em> finds <em>Śiva</em>
        </p>
        <div id="filter-bar" class="hidden" aria-label="Filter by set"></div>
      </div>

      <div id="status"></div>
      <div id="results"></div>
    </div>

    <script>
      (function () {
        "use strict";

        var THEME_KEY = "ee7-theme";

        function applyTheme(t) {
          document.documentElement.setAttribute("data-theme", t);
        }
        // init from localStorage
        (function () {
          var t = "dark";
          try {
            t = localStorage.getItem(THEME_KEY) || "dark";
          } catch (e) {}
          applyTheme(t);
        })();
        // listen for parent messages
        window.addEventListener("message", function (e) {
          if (e.data && e.data.type === "ee7-theme") applyTheme(e.data.theme);
        });

        var MAX_GROUPS = 30,
          PAGE_SIZE = 30,
          MAX_SNIPPETS = 3,
          CONTEXT_LEN = 100,
          DEBOUNCE_MS = 200,
          MIN_QUERY = 3;

        // State for incremental loading
        var _allResults = [],
          _shownCount = 0;

        // ── Filter state ────────────────────────────────────────────
        // null = no filter (all discourses). Otherwise an Object keyed
        // by the basename of allowed files for O(1) lookup.
        var _activeFilter = null;
        var _activeFilterName = null;

        function buildFilterBar() {
          var bar = document.getElementById("filter-bar");
          if (typeof filterSets === "undefined") return;
          var keys = Object.keys(filterSets);
          // Only show the bar if there's more than just "All"
          if (keys.length <= 1) return;
          bar.classList.remove("hidden");
          // Default: first key active
          _activeFilterName = keys[0];
          _activeFilter = makeFilterLookup(filterSets[keys[0]]);
          keys.forEach(function (name) {
            var btn = document.createElement("button");
            btn.className =
              "filter-chip" + (name === _activeFilterName ? " active" : "");
            btn.textContent = name;
            btn.onclick = function () {
              _activeFilterName = name;
              _activeFilter = makeFilterLookup(filterSets[name]);
              bar.querySelectorAll(".filter-chip").forEach(function (c) {
                c.classList.toggle("active", c.textContent === name);
              });
              // Re-run current query with new filter
              var q = document.getElementById("search-input").value;
              if (normalize(q.trim()).length >= MIN_QUERY) {
                _allResults = search(q);
                _shownCount = Math.min(PAGE_SIZE, _allResults.length);
                document.getElementById("results").innerHTML = renderGroups(
                  _allResults.slice(0, _shownCount),
                );
                updateShowMore();
                updateStatus();
              }
            };
            bar.appendChild(btn);
          });
        }

        function makeFilterLookup(list) {
          if (!list) return null; // null = all
          var obj = Object.create(null);
          for (var i = 0; i < list.length; i++) obj[list[i]] = true;
          return obj;
        }

        function inFilter(filePath) {
          if (!_activeFilter) return true;
          // entry.f is like "Discourses/Some_Discourse.html" — match on basename
          var base = filePath.split("/").pop();
          return !!_activeFilter[base];
        }

        function normalize(s) {
          return s
            .normalize("NFD")
            .replace(/[\u0300-\u036f\u1dc0-\u1dff\u20d0-\u20ff]/g, "")
            .toLowerCase();
        }
        function findAll(hay, needle) {
          var out = [],
            pos = 0,
            i;
          while ((i = hay.indexOf(needle, pos)) !== -1) {
            out.push(i);
            pos = i + needle.length;
          }
          return out;
        }
        function escHtml(s) {
          return s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }
        function makeSnippet(orig, normX, pos, qlen) {
          var s = Math.max(0, pos - CONTEXT_LEN),
            e = Math.min(orig.length, pos + qlen + CONTEXT_LEN);
          return (
            (s > 0 ? "[…] " : "") +
            escHtml(orig.slice(s, pos)) +
            "<mark>" +
            escHtml(orig.slice(pos, pos + qlen)) +
            "</mark>" +
            escHtml(orig.slice(pos + qlen, e)) +
            (e < orig.length ? " […]" : "")
          );
        }
        function search(rawQuery) {
          var normQ = normalize(rawQuery.trim());
          if (normQ.length < MIN_QUERY) return [];
          var map = Object.create(null),
            order = [];
          for (var i = 0; i < searchIndex.length; i++) {
            var entry = searchIndex[i];
            if (!inFilter(entry.f)) continue;
            var normX = normalize(entry.x),
              pos = findAll(normX, normQ);
            if (!pos.length) continue;
            if (!map[entry.f]) {
              map[entry.f] = { t: entry.t, f: entry.f, count: 0, snippets: [] };
              order.push(entry.f);
            }
            var g = map[entry.f];
            g.count += pos.length;
            if (g.snippets.length < MAX_SNIPPETS)
              g.snippets.push({
                a: entry.a,
                html: makeSnippet(entry.x, normX, pos[0], normQ.length),
              });
          }
          return order.map(function (k) {
            return map[k];
          });
        }
        function renderGroups(groups) {
          var html = "";
          for (var g = 0; g < groups.length; g++) {
            var grp = groups[g];
            html += '<div class="result-group">';
            html +=
              '<div class="result-title"><a href="' +
              escHtml(grp.f) +
              '" target="Client">' +
              escHtml(grp.t) +
              "</a>";
            html +=
              '<span class="result-count">(' +
              grp.count +
              " occurrence" +
              (grp.count !== 1 ? "s" : "") +
              ")</span></div>";
            for (var s = 0; s < grp.snippets.length; s++) {
              var snip = grp.snippets[s];
              html +=
                '<div class="result-snippet"><a class="result-anchor" href="' +
                escHtml(grp.f) +
                "#" +
                escHtml(snip.a) +
                '" target="Client">' +
                escHtml(snip.a) +
                "</a>" +
                snip.html +
                "</div>";
            }
            html += "</div>";
          }
          return html;
        }

        function updateShowMore() {
          var old = document.getElementById("show-more-btn");
          if (old) old.parentNode.removeChild(old);
          var remaining = _allResults.length - _shownCount;
          if (remaining <= 0) return;
          var btn = document.createElement("button");
          btn.id = "show-more-btn";
          var nextBatch = Math.min(remaining, PAGE_SIZE);
          btn.textContent =
            "Show " +
            nextBatch +
            " more" +
            (remaining > PAGE_SIZE ? " (" + remaining + " remaining)" : "");
          btn.onclick = function () {
            var next = _allResults.slice(_shownCount, _shownCount + PAGE_SIZE);
            _shownCount += next.length;
            document
              .getElementById("results")
              .insertAdjacentHTML("beforeend", renderGroups(next));
            updateShowMore();
            updateStatus();
          };
          document.getElementById("results").appendChild(btn);
        }

        function updateStatus() {
          var totalCount = 0;
          for (var i = 0; i < _allResults.length; i++)
            totalCount += _allResults[i].count;
          var showing =
            _shownCount < _allResults.length
              ? "Showing " + _shownCount + " of " + _allResults.length
              : String(_allResults.length);
          document.getElementById("status").textContent =
            showing +
            " discourse" +
            (_allResults.length !== 1 ? "s" : "") +
            ", " +
            totalCount +
            " occurrence" +
            (totalCount !== 1 ? "s" : "");
        }

        function renderResults(allGroups) {
          var re = document.getElementById("results"),
            st = document.getElementById("status"),
            hero = document.getElementById("hero");
          if (!allGroups.length) {
            re.innerHTML = "";
            st.textContent = "No results found.";
            hero.classList.add("has-results");
            return;
          }
          _allResults = allGroups;
          _shownCount = Math.min(PAGE_SIZE, allGroups.length);
          re.innerHTML = renderGroups(allGroups.slice(0, _shownCount));
          updateShowMore();
          updateStatus();
          hero.classList.add("has-results");
        }
        var timer = null;
        function onInput() {
          clearTimeout(timer);
          var q = document.getElementById("search-input").value;
          if (normalize(q.trim()).length < MIN_QUERY) {
            document.getElementById("results").innerHTML = "";
            document.getElementById("status").textContent = "";
            document.getElementById("hero").classList.remove("has-results");
            return;
          }
          timer = setTimeout(function () {
            var all = search(q);
            renderResults(all);
          }, DEBOUNCE_MS);
        }
        function pickRandom() {
          var pool;
          if (!_activeFilter) {
            // "All" — collect unique file paths from the search index
            if (typeof searchIndex === "undefined") return;
            var seen = Object.create(null);
            pool = [];
            for (var i = 0; i < searchIndex.length; i++) {
              var f = searchIndex[i].f;
              if (!seen[f]) {
                seen[f] = true;
                pool.push(f);
              }
            }
          } else {
            // Filtered — keys of _activeFilter are basenames like "Foo.html"
            pool = Object.keys(_activeFilter).map(function (fn) {
              return "Discourses/" + fn;
            });
          }
          if (!pool.length) return;
          var pick = pool[Math.floor(Math.random() * pool.length)];
          if (window.parent !== window) {
            window.parent.postMessage(
              { type: "ee7-navigate", href: pick },
              "*",
            );
          } else {
            window.location.href = pick;
          }
        }

        // Intercept result link clicks for animated navigation
        document.addEventListener("click", function (e) {
          var link = e.target.closest("#results a[href]");
          if (!link) return;
          if (window.parent === window) return;
          e.preventDefault();
          window.parent.postMessage(
            { type: "ee7-navigate", href: link.href },
            "*",
          );
        });

        window.addEventListener("load", function () {
          buildFilterBar();
          var inp = document.getElementById("search-input");
          inp.addEventListener("input", onInput);
          inp.focus();
          document
            .getElementById("random-btn")
            .addEventListener("click", pickRandom);
          if (typeof searchIndex === "undefined")
            document.getElementById("status").textContent =
              "Search index not found. Run build_search_index.py first.";
        });
      })();
    </script>
  </body>
</html>
